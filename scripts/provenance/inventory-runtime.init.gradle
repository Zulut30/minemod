// Reviewed helper for producing the sorted runtime component input consumed by
// build-neoforge-inventory.py. Keep stdout limited to one coordinate per line.
gradle.afterProject { project ->
    if (project == project.rootProject) {
        project.tasks.register("inventoryRuntimeComponents") {
            doLast {
                def ids = project.configurations.runtimeClasspath.incoming.resolutionResult.allComponents
                    .collect { it.id }
                    .findAll { it instanceof org.gradle.api.artifacts.component.ModuleComponentIdentifier }
                    .collect { "${it.group}:${it.module}:${it.version}" }
                    .toSorted()
                ids.each { println(it) }
            }
        }
    }
}
